<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNPlus Messenger</title>
    <style>
        body {
            background-color: #176F47;
            margin: 0;
            display: flex;
flex-direction: column;
            justify-content: center;
            align-items: ññ
           ;
            height: 100vh;
            color: #F08927;
            font-family: sans-serif;
            overflow: hidden;
        }

        .logo-container {
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        .logo-img {
            width: 110px;
            height: 110px;
            border-radius: 25px;
            margin-bottom: 20px;
            border: none;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto 0;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .footer-brand {
            position: absolute;
            bottom: 50px;
            font-size: 12px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.8);
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://i.postimg.cc/k4MWCJ9Y/Rounded-20260104-165201.png" alt="DNPlus Logo" class="logo-img">
        <div class="loader"></div>
    </div>

    <div class="footer-brand">
        BY DAVID OVIEDO
    </div>

    <script>
    // LÓGICA DE REDIRECCIÓN INTELIGENTE
    setTimeout(() => {
        // Buscamos rastro de registro
        const telefono = localStorage.getItem("user_phone");
        const idUsuario = localStorage.getItem("chat_destId");

        if (telefono || idUsuario) {
            // SI ESTÁ LOGUEADO: Va a la lista de chats (home.html o registro.html)
            // Asegúrate de poner el nombre exacto de tu archivo principal
            window.location.href = 'home.html'; 
        } else {
            // SI ES NUEVO: Va a la Bienvenida
            window.location.href = 'bienvenida.html';
        }
    }, 3000); 
</script>


</body>
</html>
